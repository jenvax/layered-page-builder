<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Layered Page Builder</title>
  <style>
    :root {
      --ink: #2e2745;
      --muted: #6f6584;
      --line: rgba(46, 39, 69, 0.08);
      --paper: #fffdf6;
      --cream: #fff8e8;
      --mint: #dff8ee;
      --pink: #f7a9c5;
      --peach: #ffc99a;
      --panel: rgba(255, 254, 248, 0.86);
      --card: rgba(255, 254, 248, 0.92);
      --shadow: 0 12px 28px rgba(46, 39, 69, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 12% 12%, rgba(255, 215, 134, 0.44), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(188, 239, 223, 0.56), transparent 34%),
        linear-gradient(115deg, #fff4dc, #f9fbf2 45%, #e5f8ed);
      background-size: 34px 34px, 34px 34px, auto, auto, auto;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .page {
      width: min(860px, calc(100% - 24px));
      margin: 2px auto 14px;
      padding: 0;
      overflow: hidden;
      border: 2px solid rgba(244, 189, 135, 0.7);
      border-radius: 24px;
      background:
        linear-gradient(90deg, rgba(98, 143, 120, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(98, 143, 120, 0.06) 1px, transparent 1px),
        radial-gradient(circle at 8% 8%, rgba(255, 224, 138, 0.45), transparent 30%),
        radial-gradient(circle at 94% 16%, rgba(174, 232, 211, 0.48), transparent 28%),
        var(--cream);
      background-size: 20px 20px, 20px 20px, auto, auto, auto;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      gap: 0;
      padding: 10px 28px 6px;
    }

    h1 {
      margin: 0;
      max-width: none;
      font-size: clamp(2.35rem, 4.4vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .tagline {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      font-weight: 500;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 8px 0 0;
    }

    .primary,
    .secondary,
    .small-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 20px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .primary {
      background: var(--pink);
    }

    .secondary {
      background: #cdeee7;
    }

    .primary:hover,
    .secondary:hover,
    .small-button:hover {
      transform: translateY(-2px);
      filter: saturate(1.06);
    }

    .workspace {
      display: grid;
      gap: 12px;
      align-items: start;
      padding: 8px 28px 10px;
    }

    .recipe-panel {
      border: 2px solid rgba(244, 189, 135, 0.55);
      box-shadow: var(--shadow);
      background:
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        rgba(255, 250, 240, 0.92);
      background-size: 100% 25px, auto;
      border-radius: var(--radius);
      padding: 10px 14px;
    }

    .recipe-panel h2 {
      margin: 0 0 8px;
      font-size: 1.22rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .recipe-list {
      display: grid;
      gap: 7px;
      align-items: start;
    }

    .recipe-item {
      min-height: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 92px 10px 14px;
      border: 1px solid rgba(47, 41, 66, 0.18);
      border-radius: 16px;
      background: var(--paper);
      box-shadow: 0 8px 18px rgba(47, 41, 66, 0.10);
    }

    .recipe-item:nth-child(3n + 1) {
      background:
        radial-gradient(circle at 100% 0, rgba(255, 224, 138, 0.26), transparent 34%),
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 25px, auto;
    }

    .recipe-item:nth-child(3n + 2) {
      background:
        radial-gradient(circle at 100% 0, rgba(174, 232, 211, 0.34), transparent 34%),
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 25px, auto;
    }

    .recipe-item:nth-child(3n) {
      background:
        radial-gradient(circle at 100% 0, rgba(255, 217, 227, 0.32), transparent 34%),
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 25px, auto;
    }

    .recipe-top {
      display: block;
    }

    .recipe-kicker {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.1;
      font-weight: 800;
      text-transform: uppercase;
    }

    .reroll-button {
      position: absolute;
      top: 9px;
      right: 12px;
      min-height: 30px;
      padding: 6px 13px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--cream);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .sub-reroll-button {
      align-self: flex-start;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #cdeee7;
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .recipe-title {
      margin: 0;
      font-size: clamp(0.98rem, 1.45vw, 1.16rem);
      line-height: 1.12;
      font-weight: 900;
    }

    .recipe-detail {
      margin: 0;
      color: #49354f;
      font-size: 0.86rem;
      line-height: 1.16;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 2px 0;
    }

    .swatch {
      min-height: 20px;
      border: 1px solid rgba(47, 41, 66, 0.22);
      border-radius: 7px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.32);
    }

    .color-card {
      padding-right: 92px;
    }

    .color-card .color-content {
      display: grid;
      grid-template-columns: minmax(0, 0.68fr) 180px;
      gap: 18px;
      align-items: center;
    }

    .color-card .swatches {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      margin: 0;
    }

    .color-card .swatch {
      min-height: 42px;
    }

    .toast {
      min-height: 0;
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .toast:empty {
      display: none;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 16px, 100%);
        border-radius: 22px;
      }

      .hero,
      .workspace { padding: 14px; }

      .recipe-panel {
        padding: 12px;
      }

      .recipe-detail {
        font-size: 0.92rem;
      }

      .color-card .color-content {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .color-card .swatches {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .primary,
      .secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">The Layered Page Builder</h1>
        <p class="tagline">Generate a layered art journal recipe for a playful page spread.</p>
      </div>
      <div class="actions" aria-label="Builder actions">
        <button class="primary" id="buildButton" type="button">Build My Layered Page</button>
        <button class="secondary" id="copyButton" type="button">Copy Recipe</button>
      </div>
    </section>

    <section class="workspace" aria-label="Layered page builder">
      <aside class="recipe-panel" aria-live="polite">
        <h2>Your Layered Page Recipe</h2>
        <div class="recipe-list" id="recipe"></div>
        <p class="toast" id="toast"></p>
      </aside>
    </section>
  </main>

  <script>
    const colorSchemes = {
      "Black & White": ["#FFFFFF", "#231F20", "#FFFFFF", "#231F20"],
      "Joyful Pop": ["#EF2B9B", "#F8E907", "#69CEF5", "#9CD41F"],
      "Calm & Lavender": ["#C4AADB", "#C5DDBE", "#BBE2EE", "#F4F3F3"],
      "Bold & Fiery": ["#D91D36", "#F14A2E", "#F5BE1A", "#1D1E2F"],
      "Ocean Mood": ["#215267", "#6A8C7C", "#87CE96", "#BFBBAD"],
      "Earthy & Grounded": ["#D87526", "#9BA84A", "#E8A99A", "#F2E3BD"],
      "Magical Twilight": ["#352B56", "#CAB0DE", "#F9C0DD", "#F9D859"],
      "Papaya Dream": ["#EE2722", "#7BD3DD", "#FFFFFF", "#FCD4AF"],
      "Playful Candy": ["#F8A3D5", "#B0DDF6", "#FAF66B", "#F03460"],
      "Cherry Soda": ["#E72641", "#6FCECA", "#FFFFFF", "#231F20"],
      "Neon Citrus": ["#AFDB32", "#F36817", "#FFFFFF", "#231F20"],
      "Blush & Plum": ["#F694BA", "#53245A", "#FFFFFF", "#231F20"],
      "True Blue": ["#364CA7", "#D91D36", "#FFFFFF", "#231F20"],
      "Cactus Bloom": ["#89A250", "#EE2A38", "#FFFFFF", "#231F20"],
      "Ice & Ink": ["#BCDDF5", "#4E657B", "#FFFFFF", "#231F20"],
      "Hot Pink": ["#EF2B9B", "#F36817", "#FFFFFF", "#231F20"],
      "Night Shift": ["#3E2D91", "#D0ABDB", "#FFFFFF", "#231F20"],
      "Soft & Strong": ["#D7F0D9", "#202936", "#FFFFFF", "#231F20"],
      "Tangerine Pop": ["#F46D16", "#4DC3C2", "#FFFFFF", "#EE217E"],
      "Mineral Mix": ["#33AB71", "#C197D2", "#FFFFFF", "#2B2929"],
      "Cocoa Chic": ["#694531", "#F6B7AE", "#A4C897", "#231F20"],
      "Citrus Zing": ["#FBD027", "#F57A36", "#EE2A38", "#ED3D7D"],
      "True Blue Remix": ["#2948A3", "#4DC3C7", "#5C46A6", "#231F20"],
      "Wildflower Whimsy": ["#FBD027", "#97CD3C", "#33AB71", "#6CC1ED"],
      "Drama Pop": ["#C21E25", "#345FB0", "#F68194", "#231F20"],
      "Blueberry Cream": ["#544B6E", "#D49AA0", "#FFFFFF", "#A6C9B8"],
      "Electric Candy": ["#BEDF14", "#8147A8", "#F14255", "#231F20"],
      "Fiesta Feather": ["#F5F014", "#5DC9C4", "#FFFFFF", "#E6057F"],
      "Jungle Parade": ["#ED0B80", "#2C8081", "#FFFFFF", "#7B3FA3"],
      "Lavender Llama": ["#90D5EE", "#F89A0F", "#C0B5E1", "#FFFFFF"],
      "Sunset Gecko": ["#2948A3", "#F46D16", "#AEDB25", "#FFFFFF"],
      "Tropical Roar": ["#EF2F3F", "#F9D606", "#6DCDBD", "#FFFFFF"],
      "Neon Jaguar": ["#EE1E9A", "#00ADEF", "#68C530", "#FFFFFF"],
      "Zapotec Bloom": ["#6D43A5", "#86CE26", "#DE183B", "#FFFFFF"],
      "Ruby Rainforest": ["#E30F5C", "#F7BD0A", "#FFFFFF", "#3C738A"],
      "Pink Pinata": ["#ED0F8E", "#9088CC", "#B3DB18", "#FFFFFF"]
    };

    const originalGrids = [
      "Classic Grid",
      "Scribble Circles",
      "Wonky Waves",
      "Cracks",
      "3 Sections",
      "Puzzle Pieces",
      "Diagonal Grid",
      "Wavy Grid",
      "Radiating Lines",
      "Scallops",
      "Blob Zones",
      "Flower Grid",
      "Mandala",
      "Wonky Grid",
      "3D Star"
    ];

    const grids = ["No grid", "Stripes"].concat(originalGrids);
    const openPagePrompt = "Leave the page open and allow your designs to flow across the entire spread.";

    const marks = [
      "Aura Lines",
      "Wiggle Flow",
      "Layered Hills",
      "Diagonal Lines",
      "Curved Lines",
      "Straight Lines",
      "Stripes",
      "Basket Weave",
      "Scallops",
      "Dashes",
      "Random Grid",
      "Waves",
      "Zig Zag",
      "Petal Fan",
      "Pillow Bloom",
      "Daisy",
      "Pebbles",
      "Dots",
      "Swirls",
      "Scribble",
      "Organic Scallops",
      "Loops",
      "Bubbles",
      "Handwriting",
      "Star",
      "Burst",
      "Sparkle",
      "Flower",
      "Heart",
      "4-Petal Flower"
    ];

    const gridDoodles = marks.concat([
      "Swirly Sprout",
      "Petal Splash",
      "Wandering Vine",
      "Bead Vine",
      "Petal Bloom",
      "Curly Vine",
      "Face",
      "Rainbow",
      "Stem Flower",
      "Word"
    ]);

    const topDoodles = marks.concat([
      "House",
      "City",
      "Face",
      "Rainbow",
      "Sun",
      "Moon",
      "Dangles",
      "Stem Flower",
      "Swirly Sprout",
      "Wandering Vine",
      "Bead Vine",
      "Petal Splash",
      "Curly Vine"
    ]);

    const decks = {
      color: {
        label: "Color Scheme",
        cards: Object.entries(colorSchemes).map(([name, colors]) => ({
          title: name,
          detail: "Use these colors through your whole page spread.",
          colors
        }))
      },
      prep: {
        label: "Page Prep",
        cards: [
          ["One-Color Spread", "Paint your page spread with one color."],
          ["Split-Color Spread", "Paint each page of your page spread a different color."],
          ["White Spread", "Paint your page spread with white."],
          ["Watercolor", "Add a loose watercolor wash across your page spread."],
          ["Messy Paint Strokes", "Paint messy paint strokes using three colors and white."],
          ["Add a Textured Background", "Build a background with dry brush, scribbles, stamping, layered marks, intuitive collage or crinkly tissue paper."]
        ].map(([title, detail]) => ({ title, detail }))
      },
      texture: {
        label: "Structure the Page",
        cards: [
          {
            title: "Divide the Page",
            kind: "grid"
          },
          {
            title: "Large Block Word",
            kind: "word"
          }
        ]
      },
      development: {
        label: "Visual Texture",
        cards: []
      },
      keepGoing: {
        label: "Add Shapes",
        cards: [
          { title: "Add Shapes", kind: "shape" }
        ]
      },
      characters: {
        label: "Discover Characters",
        cards: [
          { title: "Turn a Shape into a Character", detail: "Turn a shape into a character." }
        ]
      },
      world: {
        label: "Develop the World",
        cards: [
          { title: "Add a Cluster", detail: "Add a cluster." },
          { title: "Interactive Element", detail: "Add an interactive element." },
          { title: "Decorative Edges", detail: "Add decorative edges." },
          { title: "Add a Whimsical Tab", detail: "Add a whimsical tab." },
          { title: "Stack 'Em", detail: "Stack 'em." },
          { title: "Write Something", detail: "Write something." },
          { title: "Brain Dump", detail: "Brain dump." },
          { title: "Journal on the page.", detail: "Journal on the page." }
        ]
      },
      finishing: {
        label: "Finishing Touches",
        cards: [
          { title: "Thicken the Lines", detail: "Thicken the lines." },
          { title: "Paint or Scribble Over a Section", detail: "Paint or scribble over a section." },
          { title: "Cover or Paint Over an Area", detail: "Cover or paint over an area." },
          { title: "Paint Negative Space", detail: "Paint negative space." },
          { title: "Cut Out a Section", detail: "Cut out a section." },
          { title: "Splatter Something", detail: "Splatter something." },
          { title: "Doodle on Top", detail: "Doodle on top." },
          { title: "Doodle In Between", detail: "Doodle in between." }
        ]
      }
    };

    const shapes = [
      "Circles",
      "Squares",
      "Rectangles",
      "Arches",
      "Gumdrops",
      "Blobs",
      "Scallops",
      "Leaves",
      "Teardrops",
      "Clouds"
    ];

    const words = [
      "PLAY",
      "CREATE",
      "WONDER",
      "BLOOM",
      "MAGIC",
      "DREAM",
      "IMAGINE",
      "JOY",
      "GROW",
      "SMILE"
    ];

    const gridTextureCards = [
      { title: "Fill the Grid Spaces with Color", detail: "Fill the grid spaces with color." },
      { title: "Fill the Grid Spaces with Doodle & Marks", kind: "gridDoodle" }
    ];

    const openPageTextureCards = [
      { title: "Add Stripes", detail: "Add stripes by painting, drawing, or collaging them in." },
      { title: "Paint Swatches", detail: "Add loose color swatches across the page." },
      { title: "Whimsical Words", detail: "Scatter playful words, labels, or tiny phrases." },
      { title: "Fill the Page with One Shape", detail: "Repeat one shape until it fills the page." }
    ];

    const intuitiveWatercolorCard = {
      title: "Intuitive Watercolor",
      detail: "Add intuitive watercolor marks, blooms, washes, or loose shapes."
    };

    const order = ["color", "prep", "texture", "development", "keepGoing", "characters", "world", "finishing"];
    const state = {};
    const prepDrawPile = [];

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function shuffled(items) {
      const copy = items.slice();
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function resolveCard(card) {
      const mark = card.kind === "marks" ? pick(marks) : null;
      const gridOptions = card.gridOptions || grids;
      const grid = card.kind === "grid" ? pick(gridOptions) : null;
      const doodle = card.kind === "gridDoodle" ? pick(gridDoodles) : card.kind === "topDoodle" ? pick(topDoodles) : null;
      const shape = card.kind === "shape" ? pick(shapes) : null;
      const word = card.kind === "word" ? pick(words) : null;
      return {
        title: card.title,
        detail: mark ? `Fill the page with a repeating pattern of ${mark}.` : grid ? gridPrompt(grid) : card.kind === "gridDoodle" ? `Fill the grid spaces with ${doodle}.` : card.kind === "topDoodle" ? `Doodle ${doodle} on top of an existing layer.` : shape ? `Add ${shape} to your page.` : word ? `Write ${word} in large block letters.` : typeof card.detail === "function" ? card.detail() : card.detail,
        mark,
        grid,
        doodle,
        shape,
        word,
        kind: card.kind || null,
        gridOptions,
        colors: card.colors || null
      };
    }

    function gridPrompt(grid) {
      if (grid === "No grid") return openPagePrompt;
      return `Divide the page with a ${grid} grid.`;
    }

    function roll(key) {
      if (key === "prep") {
        if (!prepDrawPile.length) {
          prepDrawPile.push(...shuffled(cardsFor(key)));
        }
        return resolveCard(prepDrawPile.pop());
      }
      return resolveCard(pick(cardsFor(key)));
    }

    function cardsFor(key) {
      if (key === "development" && state.texture && state.texture.grid === "No grid") {
        if (state.prep && state.prep.title === "White Spread") {
          return openPageTextureCards.concat(intuitiveWatercolorCard);
        }
        return openPageTextureCards;
      }
      if (key === "development") {
        if (state.prep && state.prep.title === "White Spread") {
          return gridTextureCards.concat(intuitiveWatercolorCard);
        }
        return gridTextureCards;
      }
      return decks[key].cards;
    }

    function rerollMark(key) {
      if (!state[key] || state[key].kind !== "marks") return;
      let nextMark = pick(marks);
      while (marks.length > 1 && nextMark === state[key].mark) {
        nextMark = pick(marks);
      }
      state[key].mark = nextMark;
      state[key].detail = `Fill the page with a repeating pattern of ${nextMark}.`;
    }

    function rerollGrid(key) {
      if (!state[key] || state[key].kind !== "grid") return;
      const gridOptions = state[key].gridOptions || grids;
      let nextGrid = pick(gridOptions);
      while (gridOptions.length > 1 && nextGrid === state[key].grid) {
        nextGrid = pick(gridOptions);
      }
      state[key].grid = nextGrid;
      state[key].detail = gridPrompt(nextGrid);
      if (key === "texture") {
        state.development = roll("development");
      }
    }

    function rerollDoodle() {
      if (!state.development || (state.development.kind !== "gridDoodle" && state.development.kind !== "topDoodle")) return;
      const doodlePool = state.development.kind === "gridDoodle" ? gridDoodles : topDoodles;
      let nextDoodle = pick(doodlePool);
      while (doodlePool.length > 1 && nextDoodle === state.development.doodle) {
        nextDoodle = pick(doodlePool);
      }
      state.development.doodle = nextDoodle;
      state.development.detail = state.development.kind === "gridDoodle"
        ? `Fill the grid spaces with ${nextDoodle}.`
        : `Doodle ${nextDoodle} on top of an existing layer.`;
    }

    function rerollShape() {
      if (!state.keepGoing || state.keepGoing.kind !== "shape") return;
      let nextShape = pick(shapes);
      while (shapes.length > 1 && nextShape === state.keepGoing.shape) {
        nextShape = pick(shapes);
      }
      state.keepGoing.shape = nextShape;
      state.keepGoing.detail = `Add ${nextShape} to your page.`;
    }

    function rerollWord() {
      if (!state.texture || state.texture.kind !== "word") return;
      let nextWord = pick(words);
      while (words.length > 1 && nextWord === state.texture.word) {
        nextWord = pick(words);
      }
      state.texture.word = nextWord;
      state.texture.detail = `Write ${nextWord} in large block letters.`;
    }

    function recipeLabel(key) {
      if (key === "color") return "Color Scheme";
      if (key === "prep") return "Layer 1: Page Prep";
      if (key === "texture") return "Layer 2: Structure the Page";
      if (key === "development") return "Layer 3: Visual Texture";
      if (key === "keepGoing") return "Layer 4: Add Shapes";
      if (key === "characters") return "Layer 5: Discover Characters";
      if (key === "world") return "Layer 6: Develop the World";
      if (key === "finishing") return "Layer 7: Finishing Touches";
      return decks[key].label;
    }

    function render() {
      const recipeRoot = document.getElementById("recipe");

      recipeRoot.innerHTML = order.map((key, index) => {
        const deck = decks[key];
        const card = state[key];
        const label = recipeLabel(key);
        const swatches = card.colors ? `
          <div class="swatches" aria-label="${card.title} color swatches">
            ${card.colors.map((color) => `<span class="swatch" title="${color}" style="background-color: ${color}"></span>`).join("")}
          </div>
        ` : "";
        const markReroll = key === "texture" && card.kind === "marks" ? `
          <button class="sub-reroll-button" type="button" data-reroll-mark="${key}">Reroll Marks</button>
        ` : "";
        const gridReroll = "";
        const doodleReroll = key === "development" && (card.kind === "gridDoodle" || card.kind === "topDoodle") ? `
          <button class="sub-reroll-button" type="button" data-reroll-doodle>Reroll Doodle</button>
        ` : "";
        const wordReroll = key === "texture" && card.kind === "word" ? `
          <button class="sub-reroll-button" type="button" data-reroll-word>Reroll Word</button>
        ` : "";
        const shapeReroll = "";
        const rerollButton = key === "characters" ? "" : `
              <button class="reroll-button" type="button" data-reroll="${key}" aria-label="Reroll ${deck.label}">Reroll</button>
        `;
        const mainContent = key === "color" ? `
          <div class="color-content">
            <div>
              <h3 class="recipe-title">${card.title}</h3>
              <p class="recipe-detail">${card.detail}</p>
            </div>
            ${swatches}
          </div>
        ` : `
          <h3 class="recipe-title">${card.title}</h3>
          <p class="recipe-detail">${card.detail}</p>
          ${markReroll}
          ${gridReroll}
          ${doodleReroll}
          ${wordReroll}
          ${shapeReroll}
          ${swatches}
        `;
        return `
          <article class="recipe-item ${key === "color" ? "color-card" : ""}">
            <div class="recipe-top">
              <span class="recipe-kicker">${label}</span>
              ${rerollButton}
            </div>
            ${mainContent}
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-reroll]").forEach((button) => {
        button.addEventListener("click", () => {
          state[button.dataset.reroll] = roll(button.dataset.reroll);
          if (button.dataset.reroll === "prep" || button.dataset.reroll === "texture") {
            state.development = roll("development");
          }
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-mark]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollMark(button.dataset.rerollMark);
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-grid]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollGrid(button.dataset.rerollGrid);
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-doodle]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollDoodle();
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-word]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollWord();
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-shape]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollShape();
          setToast("");
          render();
        });
      });
    }

    function buildRecipe() {
      order.forEach((key) => {
        state[key] = roll(key);
      });
      setToast("");
      render();
    }

    function recipeText() {
      return order.map((key, index) => {
        const card = state[key];
        return `${recipeLabel(key)}: ${card.title}\n${card.detail}`;
      }).join("\n\n");
    }

    async function copyRecipe() {
      const text = recipeText();
      try {
        if (!navigator.clipboard) {
          throw new Error("Clipboard API unavailable");
        }
        await navigator.clipboard.writeText(text);
        setToast("Recipe copied.");
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        helper.style.top = "0";
        document.body.appendChild(helper);
        helper.select();
        const copied = document.execCommand("copy");
        document.body.removeChild(helper);
        setToast(copied ? "Recipe copied." : "Copy is unavailable in this browser. Select the recipe text instead.");
      }
    }

    function setToast(message) {
      document.getElementById("toast").textContent = message;
    }

    document.getElementById("buildButton").addEventListener("click", buildRecipe);
    document.getElementById("copyButton").addEventListener("click", copyRecipe);
    buildRecipe();
  </script>
</body>
</html>
