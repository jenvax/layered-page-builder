<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Layered Page Builder</title>
  <style>
    :root {
      --ink: #2e2745;
      --muted: #6f6584;
      --line: rgba(46, 39, 69, 0.08);
      --paper: #fffdf6;
      --cream: #fff8e8;
      --mint: #dff8ee;
      --pink: #f7a9c5;
      --peach: #ffc99a;
      --panel: rgba(255, 254, 248, 0.86);
      --card: rgba(255, 254, 248, 0.92);
      --shadow: 0 12px 28px rgba(46, 39, 69, 0.12);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 12% 12%, rgba(255, 215, 134, 0.44), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(188, 239, 223, 0.56), transparent 34%),
        linear-gradient(115deg, #fff4dc, #f9fbf2 45%, #e5f8ed);
      background-size: 34px 34px, 34px 34px, auto, auto, auto;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .page {
      width: min(1120px, calc(100% - 24px));
      margin: 8px auto 24px;
      padding: 0;
      overflow: hidden;
      border: 2px solid rgba(244, 189, 135, 0.7);
      border-radius: 20px;
      background:
        linear-gradient(90deg, rgba(98, 143, 120, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(98, 143, 120, 0.06) 1px, transparent 1px),
        radial-gradient(circle at 8% 8%, rgba(255, 224, 138, 0.45), transparent 30%),
        radial-gradient(circle at 94% 16%, rgba(174, 232, 211, 0.48), transparent 28%),
        var(--cream);
      background-size: 20px 20px, 20px 20px, auto, auto, auto;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      gap: 0;
      padding: 16px 20px 10px;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(1.65rem, 4vw, 2.45rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .tagline {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 500;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 12px 0 0;
    }

    .primary,
    .secondary,
    .small-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 800;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .primary {
      background: var(--pink);
    }

    .secondary {
      background: #cdeee7;
    }

    .primary:hover,
    .secondary:hover,
    .small-button:hover {
      transform: translateY(-2px);
      filter: saturate(1.06);
    }

    .workspace {
      display: grid;
      gap: 12px;
      align-items: start;
      padding: 14px 20px 20px;
    }

    .recipe-panel {
      border: 2px solid rgba(244, 189, 135, 0.55);
      box-shadow: var(--shadow);
      background:
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        rgba(255, 250, 240, 0.92);
      background-size: 100% 25px, auto;
      border-radius: var(--radius);
      padding: 14px;
    }

    .recipe-panel h2 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .recipe-list {
      display: grid;
      gap: 10px;
    }

    .recipe-item {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 11px;
      border: 1px solid rgba(47, 41, 66, 0.18);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: 0 8px 18px rgba(47, 41, 66, 0.10);
    }

    .recipe-item:nth-child(3n + 1) {
      background:
        radial-gradient(circle at 100% 0, rgba(255, 224, 138, 0.26), transparent 34%),
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 25px, auto;
    }

    .recipe-item:nth-child(3n + 2) {
      background:
        radial-gradient(circle at 100% 0, rgba(174, 232, 211, 0.34), transparent 34%),
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 25px, auto;
    }

    .recipe-item:nth-child(3n) {
      background:
        radial-gradient(circle at 100% 0, rgba(255, 217, 227, 0.32), transparent 34%),
        linear-gradient(rgba(47, 41, 66, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 25px, auto;
    }

    .recipe-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .recipe-kicker {
      display: block;
      color: var(--muted);
      font-size: 0.62rem;
      line-height: 1.1;
      font-weight: 800;
      text-transform: uppercase;
    }

    .reroll-button {
      flex: 0 0 auto;
      min-height: 26px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--cream);
      font-size: 0.7rem;
      font-weight: 800;
    }

    .sub-reroll-button {
      align-self: flex-start;
      min-height: 26px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #cdeee7;
      color: var(--ink);
      font-size: 0.7rem;
      font-weight: 800;
    }

    .recipe-title {
      margin: 0;
      font-size: clamp(0.95rem, 1.6vw, 1.08rem);
      line-height: 1.12;
      font-weight: 900;
    }

    .recipe-detail {
      margin: 0;
      color: #49354f;
      font-size: 0.82rem;
      line-height: 1.25;
    }

    .card-note {
      margin-top: auto;
      padding-top: 4px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
      margin: 0;
    }

    .swatch {
      min-height: 24px;
      border: 1px solid rgba(47, 41, 66, 0.22);
      border-radius: 7px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.32);
    }

    @media (min-width: 980px) {
      .recipe-list {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    .toast {
      min-height: 18px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 16px, 100%);
        border-radius: 22px;
      }

      .hero,
      .workspace { padding: 14px; }

      .primary,
      .secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">The Layered Page Builder</h1>
        <p class="tagline">Generate a layered art journal recipe for a playful page spread.</p>
      </div>
      <div class="actions" aria-label="Builder actions">
        <button class="primary" id="buildButton" type="button">Build My Layered Page</button>
        <button class="secondary" id="copyButton" type="button">Copy Recipe</button>
      </div>
    </section>

    <section class="workspace" aria-label="Layered page builder">
      <aside class="recipe-panel" aria-live="polite">
        <h2>Your Layered Page Recipe</h2>
        <div class="recipe-list" id="recipe"></div>
        <p class="toast" id="toast"></p>
      </aside>
    </section>
  </main>

  <script>
    const colorSchemes = {
      "Black & White": ["#FFFFFF", "#231F20", "#FFFFFF", "#231F20"],
      "Joyful Pop": ["#EF2B9B", "#F8E907", "#69CEF5", "#9CD41F"],
      "Calm & Lavender": ["#C4AADB", "#C5DDBE", "#BBE2EE", "#F4F3F3"],
      "Bold & Fiery": ["#D91D36", "#F14A2E", "#F5BE1A", "#1D1E2F"],
      "Ocean Mood": ["#215267", "#6A8C7C", "#87CE96", "#BFBBAD"],
      "Earthy & Grounded": ["#D87526", "#9BA84A", "#E8A99A", "#F2E3BD"],
      "Magical Twilight": ["#352B56", "#CAB0DE", "#F9C0DD", "#F9D859"],
      "Papaya Dream": ["#EE2722", "#7BD3DD", "#FFFFFF", "#FCD4AF"],
      "Playful Candy": ["#F8A3D5", "#B0DDF6", "#FAF66B", "#F03460"],
      "Cherry Soda": ["#E72641", "#6FCECA", "#FFFFFF", "#231F20"],
      "Neon Citrus": ["#AFDB32", "#F36817", "#FFFFFF", "#231F20"],
      "Blush & Plum": ["#F694BA", "#53245A", "#FFFFFF", "#231F20"],
      "True Blue": ["#364CA7", "#D91D36", "#FFFFFF", "#231F20"],
      "Cactus Bloom": ["#89A250", "#EE2A38", "#FFFFFF", "#231F20"],
      "Ice & Ink": ["#BCDDF5", "#4E657B", "#FFFFFF", "#231F20"],
      "Hot Pink": ["#EF2B9B", "#F36817", "#FFFFFF", "#231F20"],
      "Night Shift": ["#3E2D91", "#D0ABDB", "#FFFFFF", "#231F20"],
      "Soft & Strong": ["#D7F0D9", "#202936", "#FFFFFF", "#231F20"],
      "Tangerine Pop": ["#F46D16", "#4DC3C2", "#FFFFFF", "#EE217E"],
      "Mineral Mix": ["#33AB71", "#C197D2", "#FFFFFF", "#2B2929"],
      "Cocoa Chic": ["#694531", "#F6B7AE", "#A4C897", "#231F20"],
      "Citrus Zing": ["#FBD027", "#F57A36", "#EE2A38", "#ED3D7D"],
      "True Blue Remix": ["#2948A3", "#4DC3C7", "#5C46A6", "#231F20"],
      "Wildflower Whimsy": ["#FBD027", "#97CD3C", "#33AB71", "#6CC1ED"],
      "Drama Pop": ["#C21E25", "#345FB0", "#F68194", "#231F20"],
      "Blueberry Cream": ["#544B6E", "#D49AA0", "#FFFFFF", "#A6C9B8"],
      "Electric Candy": ["#BEDF14", "#8147A8", "#F14255", "#231F20"],
      "Fiesta Feather": ["#F5F014", "#5DC9C4", "#FFFFFF", "#E6057F"],
      "Jungle Parade": ["#ED0B80", "#2C8081", "#FFFFFF", "#7B3FA3"],
      "Lavender Llama": ["#90D5EE", "#F89A0F", "#C0B5E1", "#FFFFFF"],
      "Sunset Gecko": ["#2948A3", "#F46D16", "#AEDB25", "#FFFFFF"],
      "Tropical Roar": ["#EF2F3F", "#F9D606", "#6DCDBD", "#FFFFFF"],
      "Neon Jaguar": ["#EE1E9A", "#00ADEF", "#68C530", "#FFFFFF"],
      "Zapotec Bloom": ["#6D43A5", "#86CE26", "#DE183B", "#FFFFFF"],
      "Ruby Rainforest": ["#E30F5C", "#F7BD0A", "#FFFFFF", "#3C738A"],
      "Pink Pinata": ["#ED0F8E", "#9088CC", "#B3DB18", "#FFFFFF"]
    };

    const grids = [
      "Classic Grid",
      "Scribble Circles",
      "Wonky Waves",
      "Cracks",
      "3 Sections",
      "Puzzle Pieces",
      "Diagonal Grid",
      "Wavy Grid",
      "Radiating Lines",
      "Scallops",
      "Blob Zones",
      "Flower Grid",
      "Mandala",
      "Wonky Grid",
      "3D Star"
    ];

    const marks = [
      "Aura Lines",
      "Wiggle Flow",
      "Layered Hills",
      "Diagonal Lines",
      "Curved Lines",
      "Straight Lines",
      "Stripes",
      "Basket Weave",
      "Scallops",
      "Dashes",
      "Random Grid",
      "Waves",
      "Zig Zag",
      "Petal Fan",
      "Pillow Bloom",
      "Daisy",
      "Pebbles",
      "Dots",
      "Swirls",
      "Scribble",
      "Organic Scallops",
      "Loops",
      "Bubbles",
      "Handwriting",
      "Star",
      "Burst",
      "Sparkle",
      "Flower",
      "Heart",
      "4-Petal Flower"
    ];

    const gridDoodles = marks.concat([
      "Swirly Sprout",
      "Petal Splash",
      "Wandering Vine",
      "Bead Vine",
      "Petal Bloom",
      "Curly Vine",
      "Face",
      "Rainbow",
      "Stem Flower",
      "Word"
    ]);

    const topDoodles = marks.concat([
      "House",
      "City",
      "Face",
      "Rainbow",
      "Sun",
      "Moon",
      "Dangles",
      "Stem Flower",
      "Swirly Sprout",
      "Wandering Vine",
      "Bead Vine",
      "Petal Splash",
      "Curly Vine"
    ]);

    const decks = {
      color: {
        label: "Color Scheme",
        footer: "Use this palette mood for every layer.",
        cards: Object.entries(colorSchemes).map(([name, colors]) => ({
          title: name,
          detail: "Choose colors inspired by this mood, then repeat them through the whole spread.",
          colors
        }))
      },
      prep: {
        label: "Page Prep",
        footer: "Start with the whole spread.",
        cards: [
          ["One-Color Spread", "Paint your page spread with one color."],
          ["Split-Color Spread", "Paint each page of your page spread a different color."],
          ["White Spread", "Paint your page spread with white."],
          ["Watercolor", "Add a loose watercolor wash across your page spread."],
          ["Messy Paint Strokes", "Paint messy paint strokes using three colors and white."],
          ["Add a Textured Background", "Build a background with dry brush, scribbles, stamping, layered marks, intuitive collage or crinkly tissue paper."]
        ].map(([title, detail]) => ({ title, detail }))
      },
      texture: {
        label: "Visual Texture",
        footer: "Add the first visible texture layer.",
        cards: [
          { title: "Paint Swatches", detail: "Add loose color swatches across the page." },
          {
            title: "Divide the Page",
            kind: "grid"
          },
          {
            title: "Pattern of Marks",
            kind: "marks"
          },
          { title: "Whimsical Words", detail: "Scatter playful words, labels, or tiny phrases." },
          { title: "Add Stripes", detail: "Add stripes by painting, drawing, or collaging them in." },
          { title: "Cover or Paint Over an Area", detail: "Cover or paint over one area of the page." }
        ]
      },
      development: {
        label: "Page Development",
        footer: "Build depth and personality.",
        cards: [
          { title: "Repeat Any Layer 2 Prompt", detail: "Reroll Layer 2 if you want a new texture prompt, then repeat that result." },
          { title: "Add Collage Fodder", detail: "Glue on painted paper, torn scraps, collage shapes, or other fodder." },
          { title: "Decorative Edges", detail: "Add borders, scallops, dots, stripes, or doodles along the edges." },
          { title: "Write Something", detail: "Add journaling, a label, a note, or a phrase." },
          { title: "Interactive Element", detail: "Add a flap, pocket, foldout, tag, window, or hidden bit." },
          { title: "Paint Negative Space", detail: "Paint over or around a negative space to make it more intentional." },
          { title: "Cover or Paint Over an Area", detail: "Cover or paint over one area of the page." },
          { title: "Brain Dump", detail: "Write fast, loose thoughts into one section or across a layer." },
          { title: "Doodle on Top", kind: "topDoodle" },
          { title: "Add a Cluster", detail: "Group several small elements together so they feel like one moment." },
          { title: "Add a Whimsical Tab", detail: "Attach or draw a tab that makes the page feel touchable." },
          { title: "Stack 'em", detail: "Stack papers, shapes, marks, or motifs in a playful pile." }
        ]
      },
      keepGoing: {
        label: "Keep Going",
        footer: "Decide what the page needs next.",
        cards: [
          { title: "Repeat Any Layer 2 Prompt", detail: "Reroll Layer 2 if you want a new texture prompt, then repeat that result." },
          { title: "Repeat Any Layer 3 Prompt", detail: "Reroll Layer 3 if you want a new development prompt, then repeat that result." },
          { title: "Thicken the Lines", detail: "Choose a few lines and make them bolder." },
          { title: "Repeat a Motif", detail: "Pick one motif and echo it somewhere else on the spread." },
          { title: "Cut Out a Section", detail: "Cut, tear, or open a section to reveal another layer." },
          { title: "Paint or Scribble Over a Section", detail: "Cover part of the page with paint, pencil, marker, or crayon." },
          { title: "Splatter Something", detail: "Splatter paint, ink, or watered-down color." },
          { title: "Add Contrast", detail: "Use dark against light, big against small, quiet against busy." },
          { title: "Add a Focal Point", detail: "Create one place where the eye lands first." },
          { title: "Add Details with Pen", detail: "Add tiny outlines, dots, labels, hatching, or finishing marks." },
          { title: "Stop", detail: "Let the page rest. The next layer can wait." }
        ]
      }
    };

    const gridDevelopmentCards = [
      { title: "Fill the Grid Spaces with Color", detail: "Fill the grid spaces with color." },
      { title: "Fill the Grid Spaces with Doodles", kind: "gridDoodle" }
    ];

    const whiteSpreadTextureCards = [
      { title: "Intuitive Watercolor", detail: "Add intuitive watercolor marks, blooms, washes, or loose shapes." }
    ];

    const order = ["color", "prep", "texture", "development", "keepGoing"];
    const state = {};

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function resolveCard(card) {
      const mark = card.kind === "marks" ? pick(marks) : null;
      const grid = card.kind === "grid" ? pick(grids) : null;
      const doodle = card.kind === "gridDoodle" ? pick(gridDoodles) : card.kind === "topDoodle" ? pick(topDoodles) : null;
      return {
        title: card.title,
        detail: mark ? `Fill the page with a repeating pattern of ${mark}.` : grid ? `Divide the page with a ${grid} grid.` : card.kind === "gridDoodle" ? `Fill the grid spaces with ${doodle}.` : card.kind === "topDoodle" ? `Doodle ${doodle} on top of an existing layer.` : typeof card.detail === "function" ? card.detail() : card.detail,
        mark,
        grid,
        doodle,
        kind: card.kind || null,
        colors: card.colors || null
      };
    }

    function roll(key) {
      return resolveCard(pick(cardsFor(key)));
    }

    function cardsFor(key) {
      if (key === "texture" && state.prep && state.prep.title === "White Spread") {
        return decks.texture.cards.concat(whiteSpreadTextureCards);
      }
      if (key === "development" && state.texture && state.texture.title === "Divide the Page") {
        return decks.development.cards.concat(gridDevelopmentCards);
      }
      return decks[key].cards;
    }

    function rerollMark() {
      if (!state.texture || state.texture.kind !== "marks") return;
      let nextMark = pick(marks);
      while (marks.length > 1 && nextMark === state.texture.mark) {
        nextMark = pick(marks);
      }
      state.texture.mark = nextMark;
      state.texture.detail = `Fill the page with a repeating pattern of ${nextMark}.`;
    }

    function rerollGrid() {
      if (!state.texture || state.texture.kind !== "grid") return;
      let nextGrid = pick(grids);
      while (grids.length > 1 && nextGrid === state.texture.grid) {
        nextGrid = pick(grids);
      }
      state.texture.grid = nextGrid;
      state.texture.detail = `Divide the page with a ${nextGrid} grid.`;
    }

    function rerollDoodle() {
      if (!state.development || (state.development.kind !== "gridDoodle" && state.development.kind !== "topDoodle")) return;
      const doodlePool = state.development.kind === "gridDoodle" ? gridDoodles : topDoodles;
      let nextDoodle = pick(doodlePool);
      while (doodlePool.length > 1 && nextDoodle === state.development.doodle) {
        nextDoodle = pick(doodlePool);
      }
      state.development.doodle = nextDoodle;
      state.development.detail = state.development.kind === "gridDoodle"
        ? `Fill the grid spaces with ${nextDoodle}.`
        : `Doodle ${nextDoodle} on top of an existing layer.`;
    }

    function recipeLabel(key) {
      if (key === "color") return "Color Scheme";
      if (key === "prep") return "Layer 1: Page Prep";
      if (key === "texture") return "Layer 2: Visual Texture";
      if (key === "development") return "Layer 3: Page Development";
      if (key === "keepGoing") return "Layer 4+: Keep Going";
      return decks[key].label;
    }

    function render() {
      const recipeRoot = document.getElementById("recipe");

      recipeRoot.innerHTML = order.map((key, index) => {
        const deck = decks[key];
        const card = state[key];
        const label = recipeLabel(key);
        const swatches = card.colors ? `
          <div class="swatches" aria-label="${card.title} color swatches">
            ${card.colors.map((color) => `<span class="swatch" title="${color}" style="background-color: ${color}"></span>`).join("")}
          </div>
        ` : "";
        const markReroll = key === "texture" && card.kind === "marks" ? `
          <button class="sub-reroll-button" type="button" data-reroll-mark>Reroll Marks</button>
        ` : "";
        const gridReroll = key === "texture" && card.kind === "grid" ? `
          <button class="sub-reroll-button" type="button" data-reroll-grid>Reroll Grid</button>
        ` : "";
        const doodleReroll = key === "development" && (card.kind === "gridDoodle" || card.kind === "topDoodle") ? `
          <button class="sub-reroll-button" type="button" data-reroll-doodle>Reroll Doodle</button>
        ` : "";
        return `
          <article class="recipe-item">
            <div class="recipe-top">
              <span class="recipe-kicker">${label}</span>
              <button class="reroll-button" type="button" data-reroll="${key}" aria-label="Reroll ${deck.label}">Reroll</button>
            </div>
            <h3 class="recipe-title">${card.title}</h3>
            <p class="recipe-detail">${card.detail}</p>
            ${markReroll}
            ${gridReroll}
            ${doodleReroll}
            ${swatches}
            <div class="card-note">${deck.footer}</div>
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-reroll]").forEach((button) => {
        button.addEventListener("click", () => {
          state[button.dataset.reroll] = roll(button.dataset.reroll);
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-mark]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollMark();
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-grid]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollGrid();
          setToast("");
          render();
        });
      });

      document.querySelectorAll("[data-reroll-doodle]").forEach((button) => {
        button.addEventListener("click", () => {
          rerollDoodle();
          setToast("");
          render();
        });
      });
    }

    function buildRecipe() {
      order.forEach((key) => {
        state[key] = roll(key);
      });
      setToast("");
      render();
    }

    function recipeText() {
      return order.map((key, index) => {
        const card = state[key];
        return `${recipeLabel(key)}: ${card.title}\n${card.detail}`;
      }).join("\n\n");
    }

    async function copyRecipe() {
      const text = recipeText();
      try {
        if (!navigator.clipboard) {
          throw new Error("Clipboard API unavailable");
        }
        await navigator.clipboard.writeText(text);
        setToast("Recipe copied.");
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        helper.style.top = "0";
        document.body.appendChild(helper);
        helper.select();
        const copied = document.execCommand("copy");
        document.body.removeChild(helper);
        setToast(copied ? "Recipe copied." : "Copy is unavailable in this browser. Select the recipe text instead.");
      }
    }

    function setToast(message) {
      document.getElementById("toast").textContent = message;
    }

    document.getElementById("buildButton").addEventListener("click", buildRecipe);
    document.getElementById("copyButton").addEventListener("click", copyRecipe);
    buildRecipe();
  </script>
</body>
</html>
