<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Layered Page Builder</title>
  <style>
    :root {
      --ink: #2e2745;
      --muted: #6f6584;
      --line: rgba(46, 39, 69, 0.12);
      --paper: #fffdf6;
      --cream: #fff8e8;
      --mint: #dff8ee;
      --pink: #f7a9c5;
      --peach: #ffc99a;
      --panel: rgba(255, 254, 248, 0.86);
      --card: rgba(255, 254, 248, 0.92);
      --shadow: 0 18px 45px rgba(46, 39, 69, 0.10);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 12% 12%, rgba(255, 215, 134, 0.44), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(188, 239, 223, 0.56), transparent 34%),
        linear-gradient(115deg, #fff4dc, #f9fbf2 45%, #e5f8ed);
      background-size: 34px 34px, 34px 34px, auto, auto, auto;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 10px auto 40px;
      padding: clamp(24px, 4vw, 56px);
      border: 4px solid rgba(255, 188, 132, 0.72);
      border-radius: 36px;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(100deg, rgba(255, 229, 163, 0.35), rgba(227, 252, 239, 0.55));
      background-size: 34px 34px, 34px 34px, auto;
    }

    .hero {
      display: grid;
      gap: 28px;
      margin-bottom: 44px;
    }

    h1 {
      margin: 0;
      max-width: 1250px;
      font-size: clamp(3.1rem, 6.5vw, 7rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .tagline {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1.25rem, 2vw, 2rem);
      font-weight: 650;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .primary,
    .secondary,
    .small-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 72px;
      padding: 0 40px;
      border-radius: 999px;
      font-size: clamp(1.1rem, 1.7vw, 1.9rem);
      font-weight: 850;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .primary {
      min-width: min(450px, 100%);
      background: var(--pink);
    }

    .secondary {
      background: #cdeee7;
    }

    .primary:hover,
    .secondary:hover,
    .small-button:hover {
      transform: translateY(-2px);
      filter: saturate(1.06);
    }

    .workspace {
      display: grid;
      gap: clamp(28px, 3vw, 44px);
      align-items: start;
    }

    .builder-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(22px, 2.8vw, 34px);
    }

    .prompt-card,
    .recipe-panel {
      border: 2px solid rgba(46, 39, 69, 0.13);
      box-shadow: var(--shadow);
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 39, 69, 0.05) 1px, transparent 1px),
        var(--card);
      background-size: 48px 48px, 48px 48px, auto;
      border-radius: var(--radius);
    }

    .prompt-card {
      min-height: 320px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .prompt-card:nth-child(odd) {
      background-color: rgba(255, 253, 246, 0.9);
    }

    .prompt-card:nth-child(even) {
      background-color: rgba(249, 255, 250, 0.9);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: start;
      padding: 32px 34px 18px;
    }

    .card-label {
      margin: 0;
      font-size: clamp(1.35rem, 1.7vw, 2rem);
      line-height: 1.12;
      font-weight: 900;
    }

    .small-button {
      min-height: 68px;
      padding: 0 28px;
      background: var(--ink);
      color: white;
      font-size: clamp(1rem, 1.2vw, 1.55rem);
      flex: 0 0 auto;
    }

    .card-body {
      padding: 12px 34px 22px;
    }

    .prompt-title {
      margin: 0 0 20px;
      font-size: clamp(2.2rem, 3.3vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 950;
    }

    .prompt-detail {
      margin: 0;
      color: #4c3b5a;
      font-size: clamp(1.18rem, 1.7vw, 2rem);
      line-height: 1.33;
      font-weight: 520;
    }

    .card-foot {
      min-height: 74px;
      display: flex;
      align-items: end;
      padding: 18px 34px 28px;
      color: var(--muted);
      font-size: clamp(1rem, 1.3vw, 1.45rem);
      font-weight: 850;
    }

    .recipe-panel {
      padding: clamp(24px, 2.4vw, 38px);
      background-color: var(--panel);
    }

    .recipe-panel h2 {
      margin: 0 0 24px;
      font-size: clamp(1.8rem, 2.3vw, 3rem);
      letter-spacing: 0;
    }

    .recipe-list {
      display: grid;
      gap: 16px;
    }

    .recipe-item {
      padding: 22px 24px;
      border-radius: 18px;
      background: rgba(46, 39, 69, 0.07);
    }

    .recipe-kicker {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.1;
      font-weight: 950;
      text-transform: uppercase;
    }

    .recipe-title {
      margin: 0 0 7px;
      font-size: clamp(1.25rem, 1.7vw, 1.75rem);
      line-height: 1.12;
      font-weight: 900;
    }

    .recipe-detail {
      margin: 0;
      color: #3f3652;
      font-size: clamp(1rem, 1.3vw, 1.35rem);
      line-height: 1.28;
    }

    @media (min-width: 980px) {
      .recipe-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .recipe-item:first-child {
        grid-column: 1 / -1;
      }
    }

    .toast {
      min-height: 28px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 750;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 16px, 100%);
        padding: 22px 14px;
        border-radius: 26px;
      }

      .builder-grid {
        grid-template-columns: 1fr;
      }

      .card-top {
        padding: 24px 22px 12px;
      }

      .card-body {
        padding: 8px 22px 18px;
      }

      .card-foot {
        padding: 16px 22px 24px;
      }

      .prompt-card {
        min-height: 280px;
      }

      .primary,
      .secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">The Layered Page Builder</h1>
        <p class="tagline">Generate a layered art journal recipe for a playful page spread.</p>
      </div>
      <div class="actions" aria-label="Builder actions">
        <button class="primary" id="buildButton" type="button">Build My Layered Page</button>
        <button class="secondary" id="copyButton" type="button">Copy Recipe</button>
      </div>
    </section>

    <section class="workspace" aria-label="Layered page builder">
      <aside class="recipe-panel" aria-live="polite">
        <h2>Your Layered Page Recipe</h2>
        <div class="recipe-list" id="recipe"></div>
        <p class="toast" id="toast"></p>
      </aside>

      <div class="builder-grid" id="cards"></div>
    </section>
  </main>

  <script>
    const colorSchemes = [
      "Black & White",
      "Joyful Pop",
      "Calm & Lavender",
      "Bold & Fiery",
      "Ocean Mood",
      "Earthy & Grounded",
      "Magical Twilight",
      "Playful Candy",
      "Papaya Dream",
      "Cherry Soda",
      "Neon Citrus",
      "Blush & Plum",
      "True Blue",
      "Cactus Bloom",
      "Ice & Ink",
      "Hot Pink",
      "Night Shift",
      "Soft & Strong",
      "Tangerine Pop",
      "Mineral Mix",
      "Cocoa Chic",
      "Citrus Zing",
      "True Blue Remix",
      "Wildflower Whimsy",
      "Drama Pop",
      "Blueberry Cream",
      "Electric Candy",
      "Fiesta Feather",
      "Jungle Parade",
      "Sunset Gecko",
      "Tropical Roar",
      "Neon Jaguar",
      "Zapotec Bloom",
      "Ruby Rainforest",
      "Lavender Llama",
      "Pink Pinata"
    ];

    const grids = [
      "Classic Grid",
      "Scribble Circles",
      "Wonky Waves",
      "Cracks",
      "3 Sections",
      "Puzzle Pieces",
      "Diagonal Grid",
      "Wavy Grid",
      "Radiating Lines",
      "Scallops",
      "Blob Zones",
      "Flower Grid",
      "Mandala",
      "Wonky Grid",
      "3D Star"
    ];

    const marks = [
      "Aura Lines",
      "Wiggle Flow",
      "Layered Hills",
      "Diagonal Lines",
      "Curved Lines",
      "Straight Lines",
      "Stripes",
      "Basket Weave",
      "Scallops",
      "Dashes",
      "Random Grid",
      "Waves",
      "Zig Zag",
      "Petal Fan",
      "Pillow Bloom",
      "Daisy",
      "Pebbles",
      "Dots",
      "Swirls",
      "Scribble",
      "Organic Scallops",
      "Loops",
      "Bubbles",
      "Handwriting",
      "Swirly Sprout",
      "Petal Splash",
      "Wandering Vine",
      "Bead Vine",
      "Petal Bloom",
      "Curly Vine",
      "Clouds",
      "Star",
      "House",
      "City",
      "Burst",
      "Face",
      "Sparkle",
      "Flower",
      "Heart",
      "Rainbow",
      "Moon",
      "Dangles",
      "Sun",
      "Word",
      "Stem Flower",
      "4-Petal Flower"
    ];

    const decks = {
      color: {
        label: "Color Scheme",
        footer: "Use this palette mood for every layer.",
        cards: colorSchemes.map((name) => ({
          title: name,
          detail: "Choose colors inspired by this mood, then repeat them through the whole spread."
        }))
      },
      prep: {
        label: "Page Prep",
        footer: "Start with the whole spread.",
        cards: [
          ["One-Color Spread", "Paint your page spread with one color."],
          ["Split-Color Spread", "Paint each page of your page spread a different color."],
          ["White Spread", "Paint your page spread with white."],
          ["Messy Paint Strokes", "Paint messy paint strokes using three colors and white."],
          ["Collage Cover", "Cover the page with collage papers."]
        ].map(([title, detail]) => ({ title, detail }))
      },
      texture: {
        label: "Visual Texture",
        footer: "Add the first visible texture layer.",
        cards: [
          { title: "Paint Swatches", detail: "Add loose color swatches across the page." },
          {
            title: "Divide the Page",
            detail: () => `Divide the page with a ${pick(grids)}.`
          },
          { title: "Intuitive Collage", detail: "Let scraps, shapes, and color guide the next layer." },
          {
            title: "Pattern of Marks",
            detail: () => `Fill the page with a repeating pattern of ${pick(marks)}.`
          },
          { title: "Whimsical Words", detail: "Scatter playful words, labels, or tiny phrases." },
          { title: "Add Stripes", detail: "Add stripes by painting, drawing, or collaging them in." },
          { title: "Add Texture", detail: "Build texture with dry brush, scribbles, stamping, or layered marks." }
        ]
      },
      development: {
        label: "Page Development",
        footer: "Build depth and personality.",
        cards: [
          { title: "Repeat a Texture Prompt", detail: () => `Repeat layer 2 with: ${roll("texture").title}.` },
          { title: "Add Collage Fodder", detail: "Glue on painted paper, torn scraps, collage shapes, or other fodder." },
          { title: "Decorative Edges", detail: "Add borders, scallops, dots, stripes, or doodles along the edges." },
          { title: "Write Something", detail: "Add journaling, a label, a note, or a phrase." },
          { title: "Interactive Element", detail: "Add a flap, pocket, foldout, tag, window, or hidden bit." },
          { title: "Paint Negative Space", detail: "Paint over or around a negative space to make it more intentional." },
          { title: "Brain Dump", detail: "Write fast, loose thoughts into one section or across a layer." },
          { title: "Doodle on Top", detail: "Doodle directly on top of an existing layer." },
          { title: "Add a Cluster", detail: "Group several small elements together so they feel like one moment." },
          { title: "Add a Whimsical Tab", detail: "Attach or draw a tab that makes the page feel touchable." },
          { title: "Stack 'em", detail: "Stack papers, shapes, marks, or motifs in a playful pile." },
          { title: "Add a Focal Point", detail: "Create one place where the eye lands first." }
        ]
      },
      keepGoing: {
        label: "Keep Going",
        footer: "Decide what the page needs next.",
        cards: [
          { title: "Repeat a Texture Prompt", detail: () => `Repeat layer 2 with: ${roll("texture").title}.` },
          { title: "Repeat a Development Prompt", detail: () => `Repeat layer 3 with: ${roll("development").title}.` },
          { title: "Thicken the Lines", detail: "Choose a few lines and make them bolder." },
          { title: "Repeat a Motif", detail: "Pick one motif and echo it somewhere else on the spread." },
          { title: "Cut Out a Section", detail: "Cut, tear, or open a section to reveal another layer." },
          { title: "Paint or Scribble Over a Section", detail: "Cover part of the page with paint, pencil, marker, or crayon." },
          { title: "Splatter Something", detail: "Splatter paint, ink, or watered-down color." },
          { title: "Add Contrast", detail: "Use dark against light, big against small, quiet against busy." },
          { title: "Add Details with Pen", detail: "Add tiny outlines, dots, labels, hatching, or finishing marks." },
          { title: "Stop", detail: "Let the page rest. The next layer can wait." }
        ]
      }
    };

    const order = ["color", "prep", "texture", "development", "keepGoing"];
    const state = {};

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function resolveCard(card) {
      return {
        title: card.title,
        detail: typeof card.detail === "function" ? card.detail() : card.detail
      };
    }

    function roll(key) {
      return resolveCard(pick(decks[key].cards));
    }

    function render() {
      const cardRoot = document.getElementById("cards");
      const recipeRoot = document.getElementById("recipe");

      cardRoot.innerHTML = order.map((key) => {
        const deck = decks[key];
        const card = state[key];
        return `
          <article class="prompt-card">
            <header class="card-top">
              <h2 class="card-label">${deck.label}</h2>
              <button class="small-button" type="button" data-reroll="${key}" aria-label="Reroll ${deck.label}">Reroll</button>
            </header>
            <div class="card-body">
              <h3 class="prompt-title">${card.title}</h3>
              <p class="prompt-detail">${card.detail}</p>
            </div>
            <footer class="card-foot">${deck.footer}</footer>
          </article>
        `;
      }).join("");

      recipeRoot.innerHTML = order.map((key, index) => {
        const deck = decks[key];
        const card = state[key];
        return `
          <article class="recipe-item">
            <span class="recipe-kicker">${index + 1}. ${deck.label}</span>
            <h3 class="recipe-title">${card.title}</h3>
            <p class="recipe-detail">${card.detail}</p>
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-reroll]").forEach((button) => {
        button.addEventListener("click", () => {
          state[button.dataset.reroll] = roll(button.dataset.reroll);
          setToast("");
          render();
        });
      });
    }

    function buildRecipe() {
      order.forEach((key) => {
        state[key] = roll(key);
      });
      setToast("");
      render();
    }

    function recipeText() {
      return order.map((key, index) => {
        const deck = decks[key];
        const card = state[key];
        return `${index + 1}. ${deck.label}: ${card.title}\n${card.detail}`;
      }).join("\n\n");
    }

    async function copyRecipe() {
      const text = recipeText();
      try {
        if (!navigator.clipboard) {
          throw new Error("Clipboard API unavailable");
        }
        await navigator.clipboard.writeText(text);
        setToast("Recipe copied.");
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        helper.style.top = "0";
        document.body.appendChild(helper);
        helper.select();
        const copied = document.execCommand("copy");
        document.body.removeChild(helper);
        setToast(copied ? "Recipe copied." : "Copy is unavailable in this browser. Select the recipe text instead.");
      }
    }

    function setToast(message) {
      document.getElementById("toast").textContent = message;
    }

    document.getElementById("buildButton").addEventListener("click", buildRecipe);
    document.getElementById("copyButton").addEventListener("click", copyRecipe);
    buildRecipe();
  </script>
</body>
</html>
